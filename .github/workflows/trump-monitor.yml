name: Trump Impact Monitor

on:
  schedule:
    - cron: '0 */4 * * *'    # alle 4 Stunden (6x/Tag)
    - cron: '25 13 * * 1-5'  # 09:25 ET (5 min vor NYSE-Öffnung, Mo-Fr)
    - cron: '55 20 * * 1-5'  # 16:55 ET (5 min vor NYSE-Schluss, Mo-Fr)
  workflow_dispatch:          # manueller Start via GitHub UI

permissions:
  contents: write          # needed for git push (DB update)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. HuggingFace Model Cache (FinBERT ~400 MB) ───────────────
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: finbert-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            finbert-${{ runner.os }}-

      # ── 4. Dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Run monitor ─────────────────────────────────────────────
      - name: Run Trump Impact Monitor
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPE_CREATORS_API_KEY: ${{ secrets.SCRAPE_CREATORS_API_KEY }}
          GMAIL_EMAIL:             ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:         ${{ secrets.RECIPIENT_EMAIL }}
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
        run: python -u main.py

      # ── 5. Commit updated SQLite DB back to repo ───────────────────
      - name: Commit updated alerts.db
        run: |
          git config --global user.name  "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add alerts.db
          git diff --staged --quiet && echo "No DB changes to commit." || \
            git commit -m "chore: update alerts.db [skip ci]"
          git push
